server.port=8080

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/roadsync
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# External API key placeholders (never hardcode real keys)
external.google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
external.google.places.api-key=${GOOGLE_PLACES_API_KEY:}

# ML service integration
ml.service.base-url=http://127.0.0.1:8000

